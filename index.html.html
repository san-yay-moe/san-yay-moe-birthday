<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube မွေးနေ့ Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-4">
        <!-- Header -->
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-pink-600">🎉 စမ်းရေမိုးရဲ့ မွေးနေ့ Live 🎉</h1>
            <p class="text-gray-600 mt-2">YouTube မှ တိုက်ရိုက်ထုတ်လွှင့်မှု</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- YouTube Live Player -->
            <div class="lg:col-span-2">
                <div class="aspect-video w-full shadow-lg rounded-xl overflow-hidden">
                    <!-- YouTube Embed: လိုအပ်တဲ့ Video ID ကို ဒီမှာ အစားထိုးပါ -->
                    <iframe class="w-full h-full" 
                            src="https://www.youtube.com/embed/YOUR_VIDEO_ID" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="bg-white rounded-xl shadow-lg p-4 flex flex-col h-[500px]">
                <h3 class="font-bold mb-2">မွေးနေ့ဆုတောင်းများ</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto border-b mb-4 space-y-2 text-sm">
                    <p class="text-gray-500">ဆုတောင်းစကားလေးတွေ ပြောပေးပါဦး...</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-grow border rounded-lg px-2 py-1" placeholder="စာရိုက်ပါ...">
                    <button onclick="sendMessage()" class="bg-pink-500 text-white px-4 py-1 rounded-lg">ပို့</button>
                </div>
                <div class="mt-4 flex gap-2 justify-center">
                    <button onclick="sendGift('🎂')" class="bg-yellow-100 p-2 rounded-full">🎂</button>
                    <button onclick="sendGift('❤️')" class="bg-red-100 p-2 rounded-full">❤️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(input.value.trim() !== "") {
                const p = document.createElement('p');
                p.innerHTML = `<strong>ပရိသတ်:</strong> ${input.value}`;
                chatBox.appendChild(p);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function sendGift(emoji) {
            const chatBox = document.getElementById('chat-box');
            const p = document.createElement('p');
            p.innerHTML = `🎁 <strong>ပရိသတ်တစ်ဦးက ${emoji} ပေးပို့လိုက်ပါတယ်!</strong>`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
