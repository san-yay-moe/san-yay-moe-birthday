<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>အပြုံးမင်းသား စမ်းရေမိုး မွေးနေ့ Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        .heart { position: absolute; font-size: 20px; animation: float 2s linear forwards; pointer-events: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 to-purple-100 min-h-screen font-sans">
    <div class="max-w-5xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-4xl font-extrabold text-pink-600 drop-shadow-md">🎉 စမ်းရေမိုးရဲ့ မွေးနေ့ Live 🎉</h1>
            <p class="text-gray-700 mt-2 font-medium">အပြုံးမင်းသားလေးနဲ့အတူ ပျော်ရွှင်စရာ မွေးနေ့အချိန်လေးကို ဖြတ်သန်းကြမယ်</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Video Player -->
            <div class="lg:col-span-2">
                <div class="aspect-video w-full shadow-2xl rounded-2xl overflow-hidden border-4 border-white">
                    <iframe class="w-full h-full" 
                            src="https://www.youtube.com/embed/4qT6ToFkYHs" 
                            allowfullscreen>
                    </iframe>
                </div>
            </div>

            <!-- Chat Section -->
            <div class="bg-white rounded-2xl shadow-lg p-5 flex flex-col h-[500px] border border-pink-100">
                <h3 class="font-bold text-lg mb-4 text-pink-500">မွေးနေ့ဆုတောင်းစာများ</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto border-b mb-4 space-y-3 text-sm pr-2">
                    <p class="text-gray-400 italic">ဆုတောင်းစကားလေးတွေ ရေးပေးခဲ့ပါဦး...</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-grow border-2 border-pink-200 rounded-xl px-3 py-2 outline-none focus:border-pink-500" placeholder="မွေးနေ့ဆုတောင်း...">
                    <button onclick="sendMessage()" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-xl transition">ပို့</button>
                </div>
                <div class="mt-4 flex gap-4 justify-center">
                    <button onclick="sendGift('🎂')" class="bg-yellow-50 hover:bg-yellow-100 p-3 rounded-full text-2xl transition">🎂</button>
                    <button onclick="sendGift('❤️')" class="bg-red-50 hover:bg-red-100 p-3 rounded-full text-2xl transition">❤️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() !== "") {
                addChat('ပရိသတ်', input.value);
                input.value = "";
            }
        }

        function sendGift(emoji) {
            addChat('စနစ်', `🎁 ${emoji} ပေးပို့လိုက်ပါတယ်!`);
            for(let i=0; i<5; i++) createHeart(emoji);
        }

        function addChat(sender, msg) {
            const chatBox = document.getElementById('chat-box');
            const p = document.createElement('p');
            p.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function createHeart(emoji) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = emoji;
            heart.style.left = Math.random() * 100 + '%';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }
    </script>
</body>
</html>
